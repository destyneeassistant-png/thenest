<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Psychology Quiz - The Nest</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 245, 255, 0.5);
        }
        .header h1 { color: #00f5ff; font-size: 1.8em; margin-bottom: 10px; }
        .header p { color: #888; font-size: 0.95em; }
        .back-link { text-align: left; margin-bottom: 15px; }
        .back-link a { color: #00f5ff; text-decoration: none; font-weight: bold; }
        .progress-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00f5ff, #ff006e); transition: width 0.3s ease; }
        .question-counter { text-align: center; color: #00f5ff; font-weight: bold; margin-bottom: 20px; }
        .question-box { background: rgba(255,255,255,0.08); padding: 25px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid #00f5ff; }
        .question-text { font-size: 1.15em; line-height: 1.6; color: #f0f0f0; margin-bottom: 15px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { 
            background: rgba(255,255,255,0.05); 
            border: 2px solid rgba(255,255,255,0.1); 
            padding: 15px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center;
            color: #f0f0f0;
        }
        .option:hover { background: rgba(0, 245, 255, 0.15); border-color: #00f5ff; }
        .option.selected { background: rgba(0, 245, 255, 0.25); border-color: #00f5ff; }
        .option.correct { background: rgba(57, 255, 20, 0.3); border-color: #39ff14; }
        .option.wrong { background: rgba(255, 0, 110, 0.3); border-color: #ff006e; }
        .option-letter { font-weight: bold; color: #00f5ff; margin-right: 12px; min-width: 25px; }
        .feedback { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; color: #f0f0f0; line-height: 1.6; }
        .feedback.show { display: block; }
        .feedback.correct { background: rgba(57, 255, 20, 0.15); border: 1px solid #39ff14; }
        .feedback.wrong { background: rgba(255, 0, 110, 0.15); border: 1px solid #ff006e; }
        .btn-container { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #00f5ff, #ff006e); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.2); }
        .results { text-align: center; padding: 40px; display: none; }
        .results.show { display: block; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 2.5em; font-weight: bold; background: linear-gradient(135deg, #00f5ff, #ff006e); }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="back-link">
            <a href="quiz.html">← Back to Quizzes</a>
        </div>
        <div class="header">
            <h1>🧠 Clinical Psychology</h1>
            <p>Psychodynamic Theories & Theoretical Foundations</p>
            <p>40 EPPP-Style Questions</p>
        </div>
        <div id="quiz-content">
            <div class="progress-bar"><div class="progress-fill" id="progress-bar" style="width: 0%"></div></div>
            <div class="question-counter" id="question-counter">Question 1 of 40</div>
            <div class="question-box" id="question-box">
                <div class="question-text" id="question-text"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>
            <div class="btn-container">
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">Previous</button>
                <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Next</button>
            </div>
        </div>
        <div class="results" id="results">
            <div class="score-circle" id="score-circle">0%</div>
            <h2 id="score-message"></h2>
            <div class="btn-container">
                <button class="btn btn-primary" onclick="restartQuiz()">Restart Quiz</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "A 35-year-old client consistently chooses partners who are emotionally unavailable. According to object relations theory, this most likely stems from:",
                options: ["Fixation in the phallic stage","Internalized representations of early caregiver relationships","Imbalance between id and superego","Failure to achieve self-actualization"],
                correct: 1,
                explanation: "Object relations theory emphasizes that early relationships with caregivers become internalized as mental representations that influence later relationships."
            },
            {
                q: "A client demonstrates resistance by consistently arriving late. From a psychodynamic perspective, this represents:",
                options: ["Conscious avoidance","Unconscious avoidance of anxiety-provoking content","Deliberate sabotage","Poor motivation"],
                correct: 1,
                explanation: "Resistance in psychodynamic therapy is understood as an unconscious defense protecting the client from anxiety-provoking material."
            },
            {
                q: "According to Freud's structural theory, delaying gratification to avoid negative consequences represents which structure's function?",
                options: ["Id","Ego","Superego","Collective unconscious"],
                correct: 1,
                explanation: "The ego operates on the reality principle and mediates between the id's demands and reality constraints."
            },
            {
                q: "A client with harsh parenting now has an extremely harsh inner critic. This is best explained by:",
                options: ["Reaction formation","Internalization of the superego","Projection of the shadow","Fixation in the anal stage"],
                correct: 1,
                explanation: "The superego develops through internalization of parental values and standards, becoming an internal critic."
            },
            {
                q: "In Adlerian therapy, what refers to the individual's unique way of striving for superiority?",
                options: ["Style of life","Archetype","Object relations","Psychosexual stage"],
                correct: 0,
                explanation: "Adler's 'style of life' refers to the individual's unified approach to life including goals and strategies for compensating for inferiority."
            },
            {
                q: "According to Jung, what represents universal, inherited patterns in the collective unconscious?",
                options: ["Personal complexes","Archetypes","Defense mechanisms","Cognitive schemas"],
                correct: 1,
                explanation: "Jung proposed archetypes as universal, inherited patterns in the collective unconscious (e.g., mother, hero archetypes)."
            },
            {
                q: "An object relations therapist would focus intervention on:",
                options: ["Resolving oedipal conflicts","Modifying cognitive schemas","Changing patterns based on internalized object representations","Facilitating self-actualization"],
                correct: 2,
                explanation: "Object relations therapy focuses on how early relationships become internalized and influence current relationships."
            },
            {
                q: "Expressing excessive admiration for a colleague one actually resents exemplifies which defense mechanism?",
                options: ["Sublimation","Reaction formation","Intellectualization","Displacement"],
                correct: 1,
                explanation: "Reaction formation transforms unacceptable impulses into their opposite—converting resentment into admiration."
            },
            {
                q: "Fixation in which stage is associated with excessive orderliness and obstinacy?",
                options: ["Oral","Anal","Phallic","Genital"],
                correct: 1,
                explanation: "Freud proposed anal stage fixation (from toilet training issues) leads to 'anal retentive' traits like orderliness and obstinacy."
            },
            {
                q: "A recurring dream of being pursued by a shadowy figure most likely represents:",
                options: ["Anima/animus","Shadow archetype","Phallic fixation","Superior function"],
                correct: 1,
                explanation: "In Jungian theory, the shadow archetype represents disowned aspects of the self, often appearing as pursuing figures in dreams."
            }
        ];

        let currentQ = 0;
        let score = 0;
        let answered = false;
        let userAnswers = [];

        function loadQuestion() {
            answered = false;
            const q = questions[currentQ];
            document.getElementById('question-counter').textContent = `Question ${currentQ + 1} of ${questions.length}`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('progress-bar').style.width = `${((currentQ + 1) / questions.length) * 100}%`;
            
            let optionsHTML = '';
            q.options.forEach((opt, i) => {
                optionsHTML += `<div class="option" onclick="selectOption(${i})" data-index="${i}"><span class="option-letter">${String.fromCharCode(65 + i)}.</span> ${opt}</div>`;
            });
            document.getElementById('options').innerHTML = optionsHTML;
            
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').textContent = '';
            document.getElementById('submit-btn').style.display = 'inline-block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('prev-btn').style.display = currentQ > 0 ? 'inline-block' : 'none';
        }

        function selectOption(index) {
            if (answered) return;
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.option')[index].classList.add('selected');
        }

        function submitAnswer() {
            if (answered) return;
            const selected = document.querySelector('.option.selected');
            if (!selected) {
                alert('Please select an answer');
                return;
            }
            
            answered = true;
            const selectedIndex = parseInt(selected.dataset.index);
            const q = questions[currentQ];
            
            if (selectedIndex === q.correct) {
                score++;
                selected.classList.add('correct');
                document.getElementById('feedback').className = 'feedback correct show';
                document.getElementById('feedback').innerHTML = `<strong>✓ Correct!</strong><br>${q.explanation}`;
            } else {
                selected.classList.add('wrong');
                document.querySelectorAll('.option')[q.correct].classList.add('correct');
                document.getElementById('feedback').className = 'feedback wrong show';
                document.getElementById('feedback').innerHTML = `<strong>✗ Incorrect.</strong><br>${q.explanation}`;
            }
            
            document.getElementById('submit-btn').style.display = 'none';
            if (currentQ < questions.length - 1) {
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                document.getElementById('next-btn').textContent = 'See Results';
                document.getElementById('next-btn').style.display = 'inline-block';
                document.getElementById('next-btn').onclick = showResults;
            }
        }

        function nextQuestion() {
            currentQ++;
            loadQuestion();
        }

        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('results').classList.add('show');
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('score-circle').textContent = `${percentage}%`;
            document.getElementById('score-message').innerHTML = `You scored ${score} out of ${questions.length}<br>${percentage >= 70 ? 'Great job!' : 'Keep studying!'}`;
        }

        function restartQuiz() {
            currentQ = 0;
            score = 0;
            answered = false;
            document.getElementById('quiz-content').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            document.getElementById('next-btn').textContent = 'Next';
            document.getElementById('next-btn').onclick = nextQuestion;
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
