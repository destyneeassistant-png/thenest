<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#fafafa"><title>The Nest</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="styles.css"><link rel="icon" href="assets/owl-icon.svg"></head><body class="lock-screen-body"><main class="pin-container"><img src="assets/owl-icon.svg" alt="" class="owl-icon"><h1>The Nest</h1><p class="subtitle">Local convenience lock</p><p class="trust-note">This PIN is a convenience on this device, not security or authentication. Hosted files and browser data are not encrypted by it.</p><div class="pin-display" id="pin-display" aria-label="Four digit PIN"><span class="pin-dot" id="dot-1"></span><span class="pin-dot" id="dot-2"></span><span class="pin-dot" id="dot-3"></span><span class="pin-dot" id="dot-4"></span></div><div class="pin-pad"> <button class="pin-btn" data-num="1">1</button><button class="pin-btn" data-num="2">2</button><button class="pin-btn" data-num="3">3</button><button class="pin-btn" data-num="4">4</button><button class="pin-btn" data-num="5">5</button><button class="pin-btn" data-num="6">6</button><button class="pin-btn" data-num="7">7</button><button class="pin-btn" data-num="8">8</button><button class="pin-btn" data-num="9">9</button><button class="pin-btn" data-action="clear" aria-label="Clear">⌫</button><button class="pin-btn" data-num="0">0</button><button class="pin-btn" data-action="enter" aria-label="Enter">→</button></div><p class="pin-error" id="pin-error" role="alert"></p></main><script src="theme.js"></script><script src="app.js"></script></body></html>
