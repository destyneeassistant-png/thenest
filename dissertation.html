<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#fafafa"><title>Dissertation · The Nest</title><link rel="stylesheet" href="styles.css"><link rel="manifest" href="manifest.json"></head><body><main class="page narrow"><header class="page-heading"><div><p class="eyebrow">Local workspace</p><h1>Dissertation</h1><p class="muted">Keep the next move visible. This workspace saves only in this browser.</p></div><span id="save-status" role="status" aria-live="polite" class="badge">Ready</span></header><form id="dissertation-form" class="form-grid"><section class="card span-2"><h2>Current focus</h2><div class="field-grid"><label>Chapter<input name="chapter" placeholder="e.g. Chapter 2"></label><label>Section<input name="section" placeholder="e.g. Needs assessment"></label></div><label>Next action<textarea name="nextAction" required placeholder="A concrete next step"></textarea></label></section><section class="card"><h2>Milestone</h2><label>Milestone<input name="milestone"></label><label>Due date<input name="dueDate" type="date"></label><div class="field-grid"><label>Page count<input name="pageCount" type="number" min="0"></label><label>Word count<input name="wordCount" type="number" min="0"></label></div></section><section class="card"><h2>Review</h2><label>Feedback state<select name="feedbackState"><option>Not requested</option><option>Preparing to send</option><option>Awaiting feedback</option><option>Revising</option><option>Complete</option></select></label><label>Blockers<textarea name="blockers" placeholder="Questions, missing sources, decisions…"></textarea></label></section><section class="card span-2"><h2>Related links</h2><label>One URL per line<textarea name="relatedLinks" placeholder="https://…"></textarea></label><div id="related-links" class="link-list"></div><button class="button" type="submit">Save workspace</button></section></form></main><script src="storage.js"></script><script src="app-shell.js"></script><script src="dissertation.js"></script></body></html>
