<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory & Forgetting Quiz - The Nest</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 245, 255, 0.5);
        }
        .header h1 { color: #00f5ff; font-size: 1.8em; margin-bottom: 10px; }
        .header p { color: #888; font-size: 0.95em; }
        .back-link { text-align: left; margin-bottom: 15px; }
        .back-link a { color: #00f5ff; text-decoration: none; font-weight: bold; }
        .progress-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00f5ff, #ff006e); transition: width 0.3s ease; }
        .question-counter { text-align: center; color: #00f5ff; font-weight: bold; margin-bottom: 20px; }
        .question-box { background: rgba(255,255,255,0.08); padding: 25px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid #00f5ff; }
        .question-text { font-size: 1.15em; line-height: 1.6; color: #f0f0f0; margin-bottom: 15px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { 
            background: rgba(255,255,255,0.05); 
            border: 2px solid rgba(255,255,255,0.1); 
            padding: 15px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center;
            color: #f0f0f0;
        }
        .option:hover { background: rgba(0, 245, 255, 0.15); border-color: #00f5ff; }
        .option.selected { background: rgba(0, 245, 255, 0.25); border-color: #00f5ff; }
        .option.correct { background: rgba(57, 255, 20, 0.3); border-color: #39ff14; }
        .option.wrong { background: rgba(255, 0, 110, 0.3); border-color: #ff006e; }
        .option-letter { font-weight: bold; color: #00f5ff; margin-right: 12px; min-width: 25px; }
        .feedback { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; color: #f0f0f0; line-height: 1.6; }
        .feedback.show { display: block; }
        .feedback.correct { background: rgba(57, 255, 20, 0.15); border: 1px solid #39ff14; }
        .feedback.wrong { background: rgba(255, 0, 110, 0.15); border: 1px solid #ff006e; }
        .btn-container { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #00f5ff, #ff006e); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.2); }
        .results { text-align: center; padding: 40px; display: none; }
        .results.show { display: block; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 2.5em; font-weight: bold; color: white; background: linear-gradient(135deg, #00f5ff, #ff006e); }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="back-link">
            <a href="quiz.html">← Back to Quizzes</a>
        </div>
        <div class="header">
            <h1>🧠 Memory & Forgetting</h1>
            <p>Memory Systems, Forgetting Theories & Cognitive Processes</p>
            <p>25 EPPP-Style Questions | Easy → Medium → Hard</p>
        </div>
        <div id="quiz-content">
            <div class="progress-bar"><div class="progress-fill" id="progress-bar" style="width: 0%"></div></div>
            <div class="question-counter" id="question-counter">Question 1 of 25</div>
            <div class="question-box" id="question-box">
                <div class="question-text" id="question-text"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>
            <div class="btn-container">
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">Previous</button>
                <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Next</button>
            </div>
        </div>
        <div class="results" id="results">
            <div class="score-circle" id="score-circle">0%</div>
            <h2 id="score-message"></h2>
            <p id="score-details" style="color: #888; margin: 15px 0;"></p>
            <div class="btn-container">
                <button class="btn btn-primary" onclick="restartQuiz()">Restart Quiz</button>
                <a href="quiz.html" class="btn btn-secondary" style="text-decoration: none; display: inline-flex; align-items: center;">Back to All Quizzes</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            // EASY (1-8)
            {
                q: "A student repeats a phone number over and over to keep it in mind before dialing. This is an example of:",
                options: ["Elaborative rehearsal","Maintenance rehearsal","Chunking","Semantic processing"],
                correct: 1,
                explanation: "Maintenance rehearsal involves simply repeating information with little or no processing to keep it in short-term memory. This contrasts with elaborative rehearsal, which involves relating new information to existing knowledge."
            },
            {
                q: "The brief storage of visual stimuli that lasts no more than a few seconds is known as:",
                options: ["Echoic store","Iconic store","Working memory","Long-term memory"],
                correct: 1,
                explanation: "The iconic store is the sensory memory store for visual stimuli. The echoic store is the sensory store for auditory information. Both provide very brief storage (a few seconds) of sensory stimuli."
            },
            {
                q: "According to the information processing model, short-term memory can hold approximately how many distinct units of information?",
                options: ["3 to 5 items","5 to 9 items","10 to 12 items","Unlimited capacity"],
                correct: 1,
                explanation: "Short-term memory has an average capacity of between 5 and 9 (7±2) distinct units. The ability to hold larger amounts is due to chunking related items together."
            },
            {
                q: "A person vividly remembers exactly where they were and what they were doing when they heard about a major national tragedy. This is an example of:",
                options: ["Semantic memory","Procedural memory","Flashbulb memory","Prospective memory"],
                correct: 2,
                explanation: "Flashbulb memories are vivid, detailed images of what one was doing at the time a dramatic event occurred. They are stored in episodic (autobiographical) memory."
            },
            {
                q: "When recalling a grocery list immediately after hearing it, a person remembers the first and last items better than those in the middle. This is called:",
                options: ["The spacing effect","The serial position effect","Levels of processing effect","The recency principle"],
                correct: 1,
                explanation: "The serial position effect occurs when items at the beginning (primacy effect) and end (recency effect) of a list are recalled better than those in the middle."
            },
            {
                q: "A therapist asks a client to remember to take their medication at 8 PM every night. This type of memory is called:",
                options: ["Retrospective memory","Prospective memory","Implicit memory","Semantic memory"],
                correct: 1,
                explanation: "Prospective memory is the capacity to remember to do things in the future. It is a component of long-term memory responsible for remembering future intentions."
            },
            {
                q: "General knowledge about facts, rules, and concepts that is independent of any personal context is known as:",
                options: ["Episodic memory","Procedural memory","Semantic memory","Working memory"],
                correct: 2,
                explanation: "Semantic memory stores general knowledge, facts, rules, and concepts. It is independent of personal context, unlike episodic memory which stores personally experienced events."
            },
            {
                q: "According to interference theory, when previously learned information makes it harder to learn new material, this is called:",
                options: ["Retroactive interference","Proactive interference","Cue-dependent forgetting","Trace decay"],
                correct: 1,
                explanation: "Proactive interference occurs when prior (old) learning interferes with the learning or recall of subsequent material. Retroactive interference is when new learning interferes with recall of old material."
            },
            // MEDIUM (9-17)
            {
                q: "A student studies for an exam in a quiet library but takes the test in a noisy classroom. According to encoding specificity, their recall will likely be:",
                options: ["Enhanced due to the change in environment","Impaired due to mismatch between encoding and retrieval contexts","Unaffected because memory traces are context-independent","Improved because multiple contexts strengthen memory"],
                correct: 1,
                explanation: "Encoding specificity states that recall is better when the cues present at retrieval match those present during encoding. A mismatch between study and test environments impairs recall."
            },
            {
                q: "A driver can operate a vehicle while holding a conversation because driving has become automatic through repetition. This demonstrates:",
                options: ["Elaborative rehearsal","Procedural memory for skills and habits","Semantic memory for traffic rules","Working memory capacity"],
                correct: 1,
                explanation: "Procedural memory stores information about how to do things (learning how) and is used to acquire, retain, and employ perceptual, cognitive, and motor skills and habits."
            },
            {
                q: "When asked to recall a word list, a person remembers the first words better than middle words because those items:",
                options: ["Are still in short-term memory","Have been rehearsed and stored in long-term memory","Were processed at the semantic level","Benefited from maintenance rehearsal only"],
                correct: 1,
                explanation: "The primacy effect occurs because words at the beginning of a list have already been rehearsed and transferred to long-term memory, making them more resistant to forgetting."
            },
            {
                q: "A student learns material while happy but is tested while anxious. According to state-dependent learning, their recall will likely be:",
                options: ["Enhanced due to emotional arousal","Impaired due to mismatch between emotional states","Unaffected by emotional states","Improved because varied emotions strengthen encoding"],
                correct: 1,
                explanation: "State-dependent learning shows that recall of information is sometimes better when the learner is in the same emotional state during learning and recall. Mismatched emotional states impair retrieval."
            },
            {
                q: "A person trying to remember an actor's name can almost recall it but cannot quite retrieve it. According to cue-dependent forgetting, this 'tip of the tongue' phenomenon results from:",
                options: ["Trace decay over time","Inadequate retrieval cues","Retroactive interference from similar names","Proactive interference from earlier learning"],
                correct: 1,
                explanation: "Cue-dependent forgetting occurs when cues needed to retrieve information from long-term memory are insufficient or incomplete. The tip of the tongue phenomenon is believed to be due to inadequate retrieval cues."
            },
            {
                q: "In Baddeley's working memory model, which component directs attention to relevant information and suppresses irrelevant information?",
                options: ["The phonological loop","The visuo-spatial sketchpad","The episodic buffer","The central executive"],
                correct: 3,
                explanation: "The central executive is described by Baddeley as an attentional control system. It is responsible for directing attention to relevant information, suppressing irrelevant information, and coordinating the three subsystems."
            },
            {
                q: "A student relates new psychology concepts to their personal experiences and existing knowledge about human behavior. This strategy represents:",
                options: ["Maintenance rehearsal","Elaborative rehearsal","The method of loci","State-dependent learning"],
                correct: 1,
                explanation: "Elaborative rehearsal involves relating new information to existing information. Information is more likely to be transferred from short-term to long-term memory with elaborative rehearsal than with maintenance rehearsal."
            },
            {
                q: "An eyewitness to a crime remembers seeing a weapon that was never actually present. This distortion is best explained by:",
                options: ["Trace decay over time","Schema-based construction of memory","Sensory memory failure","Working memory overload"],
                correct: 1,
                explanation: "Many distortions in memory result from interpreting information through existing schemas. Constructing memories by combining new information with existing knowledge can cause inaccuracies and systematic biases."
            },
            {
                q: "According to Ebbinghaus's forgetting curve, forgetting of nonsense syllables occurs:",
                options: ["At a constant rate over time","Most rapidly during the first 4-5 days, then tapers off","Only after 30 days have passed","Primarily due to proactive interference"],
                correct: 1,
                explanation: "Ebbinghaus (1885) found that the rote learning of nonsense syllables is followed by a predictable forgetting curve in which most forgetting occurs during the first 4-5 days and then gradually tapers off."
            },
            // HARD (18-25)
            {
                q: "A 75-year-old man has difficulty remembering to take his medication at specific times but can still recall facts from his childhood and perform routine household tasks. This pattern suggests:",
                options: ["Primarily episodic memory impairment with preserved semantic and procedural memory","Primarily semantic memory impairment with preserved episodic and procedural memory","Primarily procedural memory impairment with preserved episodic and semantic memory","Equal impairment across all memory systems"],
                correct: 0,
                explanation: "Episodic (autobiographical) memory is affected more by normal aging than semantic and procedural memory. Prospective memory (remembering future intentions) is particularly vulnerable in aging."
            },
            {
                q: "A student memorizes a speech by mentally placing each paragraph in a different room of their childhood home. This memory technique is called:",
                options: ["The keyword method","The method of loci","Elaborative rehearsal","State-dependent learning"],
                correct: 1,
                explanation: "The method of loci is a visual mnemonic device involving associating items to be remembered with a series of places already in memory. It is classified as a visual mnemonic strategy."
            },
            {
                q: "During a dichotic listening task, a participant is asked to repeat speech presented to one ear while ignoring the other. According to filter theory, this demonstrates:",
                options: ["The serial position effect","Selective attention based on physical characteristics","State-dependent learning","The distinction between procedural and declarative memory"],
                correct: 1,
                explanation: "Filter theory of selective attention (bottleneck theory) explains how information is transferred from sensory memory to short-term memory based on physical characteristics, as demonstrated by split-span listening tasks."
            },
            {
                q: "A student learns vocabulary words by creating vivid mental images that connect each new word to a familiar English word. This imagery technique is called:",
                options: ["The method of loci","The keyword method","Elaborative rehearsal","Semantic processing"],
                correct: 1,
                explanation: "The keyword method is an imagery technique for paired associate tasks in which two words must be linked. It involves creating a visual association between a familiar word (keyword) and the new word to be learned."
            },
            {
                q: "In the levels of processing model, which level of processing produces the greatest amount of recall?",
                options: ["Structural (shallow) processing","Phonemic processing","Semantic (deep) processing","Maintenance rehearsal"],
                correct: 2,
                explanation: "The levels of processing model distinguishes between structural, phonemic, and semantic levels of processing. The semantic level is the deepest level of processing and produces the greatest amount of recall."
            },
            {
                q: "According to the multi-component model of working memory, which subsystem temporarily integrates auditory, visual, and spatial information into a unified representation?",
                options: ["The phonological loop","The visuo-spatial sketchpad","The episodic buffer","The central executive"],
                correct: 2,
                explanation: "The episodic buffer is a subsystem of working memory that temporarily integrates auditory, visual, and spatial information. It serves as a temporary storage system that combines information from different sources."
            },
            {
                q: "A person who learned to ride a bicycle as a child can still ride decades later despite not having ridden in years. According to trace decay theory, this persistence occurs because:",
                options: ["Procedural memories do not produce engrams","The engram for well-learned motor skills decays more slowly than other memories","Regular rehearsal has maintained the memory trace","Procedural memories are stored in short-term memory permanently"],
                correct: 1,
                explanation: "Trace decay theory proposes that learning produces a physiological change (engram, or memory trace) that decays over time. Well-learned procedural skills may have more robust engrams that resist decay, or the skill may have been overlearned to the point of automaticity."
            },
            {
                q: "According to feature integration theory, when searching for a red circle among blue circles and red squares, initial processing of color and shape occurs in which stage?",
                options: ["The attentive stage, where features are bound together","The preattentive stage, where features are processed separately","The semantic stage, where meaning is extracted","The encoding stage, where information enters short-term memory"],
                correct: 1,
                explanation: "Feature integration theory proposes that initial visual processing involves a preattentive stage where features like color and shape are processed separately and in parallel, followed by an attentive stage where features are bound together into coherent objects."
            }
        ];

        let currentQuestion = 0;
        let selectedOption = null;
        let answers = [];
        let submitted = false;

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('question-counter').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                if (answers[currentQuestion] === idx) {
                    btn.classList.add('selected');
                    selectedOption = idx;
                }
                btn.innerHTML = `<span class="option-letter">${letters[idx]}.</span> ${opt}`;
                btn.onclick = () => selectOption(idx);
                optionsDiv.appendChild(btn);
            });
            
            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback';
            feedback.innerHTML = '';
            
            if (answers[currentQuestion] !== undefined) {
                showFeedback();
            } else {
                submitted = false;
                document.getElementById('submit-btn').style.display = 'inline-block';
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('next-btn').style.display = 'none';
            }
            
            document.getElementById('prev-btn').disabled = currentQuestion === 0;
        }

        function selectOption(idx) {
            if (submitted) return;
            selectedOption = idx;
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === idx);
            });
        }

        function submitAnswer() {
            if (selectedOption === null) return;
            submitted = true;
            answers[currentQuestion] = selectedOption;
            
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.disabled = true;
                if (i === questions[currentQuestion].correct) {
                    opt.classList.add('correct');
                } else if (i === selectedOption && i !== questions[currentQuestion].correct) {
                    opt.classList.add('wrong');
                }
            });
            
            showFeedback();
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function showFeedback() {
            const q = questions[currentQuestion];
            const feedback = document.getElementById('feedback');
            const isCorrect = answers[currentQuestion] === q.correct;
            
            feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;
            feedback.innerHTML = `<strong>${isCorrect ? 'Correct!' : 'Incorrect.'}</strong><br>${q.explanation}`;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                selectedOption = null;
                submitted = false;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                selectedOption = answers[currentQuestion] !== undefined ? answers[currentQuestion] : null;
                submitted = answers[currentQuestion] !== undefined;
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            let correct = 0;
            answers.forEach((ans, idx) => {
                if (ans === questions[idx].correct) correct++;
            });
            
            const percentage = Math.round((correct / questions.length) * 100);
            document.getElementById('score-circle').textContent = `${percentage}%`;
            document.getElementById('score-details').textContent = `You got ${correct} out of ${questions.length} questions correct.`;
            
            let message = '';
            if (percentage >= 90) message = 'Outstanding! Excellent understanding of memory & forgetting!';
            else if (percentage >= 75) message = 'Great job! Strong grasp of the material.';
            else if (percentage >= 60) message = 'Good effort! Review the explanations to strengthen understanding.';
            else message = 'Keep studying! Focus on the concepts in the explanations.';
            
            document.getElementById('score-message').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            selectedOption = null;
            answers = [];
            submitted = false;
            document.getElementById('quiz-content').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
