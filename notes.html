<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#fafafa"><title>Notes · The Nest</title><link rel="stylesheet" href="styles.css"><link rel="manifest" href="manifest.json"></head><body><main class="notes-container"><aside class="notes-sidebar"><div class="sidebar-header"><div><p class="eyebrow">Workspace</p><h1>Notes</h1></div><button class="button" id="new-note-btn">New</button></div><div class="notes-tools"><label for="note-search">Search</label><input id="note-search" type="search" placeholder="Search title, text, tags…"><label for="category-filter">Category</label><select id="category-filter"><option value="">All categories</option><option>Inbox</option><option>General</option><option>Dissertation</option><option>Study</option><option>Practicum</option><option>Personal</option></select></div><div class="notes-list" id="notes-list" aria-live="polite"></div></aside><section class="note-editor"><div class="empty-editor" id="empty-editor"><p>Select a note or create a new one.</p></div><div class="editor-content" id="editor-content" hidden><div class="editor-header"><input id="note-title" aria-label="Note title" placeholder="Untitled note"><button class="btn-danger" id="delete-btn">Delete</button></div><div class="editor-meta"><label>Category<select id="note-category"><option>Inbox</option><option>General</option><option>Dissertation</option><option>Study</option><option>Practicum</option><option>Personal</option></select></label><label>Tags<input id="note-tags" placeholder="comma, separated"></label><label><span>Pin</span><input id="note-pinned" type="checkbox"></label></div><textarea class="note-textarea" id="note-content" placeholder="Start writing…"></textarea><div class="editor-footer"><div class="save-status" id="save-status" role="status" aria-live="polite">Saved locally</div><div id="word-count" class="muted">0 words</div></div></div></section></main><script src="storage.js"></script><script src="app-shell.js"></script><script src="notes.js"></script></body></html>
