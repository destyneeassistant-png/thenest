<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#fafafa"><title>Plan · The Nest</title><link rel="stylesheet" href="styles.css"><link rel="manifest" href="manifest.json"><style>.calendar-shell{display:grid;grid-template-columns:240px minmax(0,1fr);gap:16px}.cal-sidebar,.cal-main{background:var(--surface);box-shadow:var(--shadow);border-radius:var(--radius);padding:16px}.cal-sidebar{align-self:start;display:grid;gap:12px}.cal-toolbar,.cal-toolbar-left,.cal-toolbar-right,.form-actions,.form-actions-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.cal-toolbar{justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:16px}.cal-title{font-size:20px;margin:0}.cal-btn,.cal-icon-btn,.cal-view-btn{min-height:44px;border:1px solid var(--border);background:var(--surface);color:var(--foreground);padding:0 12px;cursor:pointer}.cal-btn.primary,.cal-view-btn.active{background:var(--accent);color:var(--accent-fg)}.cal-btn.danger{color:var(--danger)}.cal-search{width:100%}.sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:8px}.mini-month{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}.mini-cell{min-height:32px;border:0;background:transparent;color:var(--muted)}button.mini-cell{cursor:pointer}.mini-cell.today,.mini-cell.selected{background:var(--foreground);color:var(--background)}.cal-list{display:grid;gap:6px}.cal-list-item{padding:10px;border-left:2px solid var(--foreground);background:var(--surface-2);cursor:pointer}.cal-list-time,.cal-muted{font-size:12px;color:var(--muted)}.calendar-stage{overflow:auto;padding-top:16px}.month-grid{display:grid;grid-template-columns:repeat(7,minmax(110px,1fr));min-width:770px}.month-head,.month-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px}.month-head{font-size:12px;color:var(--muted)}.month-cell{min-height:120px}.month-cell.today{box-shadow:inset 0 0 0 2px var(--foreground)}.month-date{display:flex;justify-content:space-between}.event-chip,.week-event{display:block;width:100%;border:0;border-left:3px solid currentColor;background:var(--surface-2);color:var(--foreground);text-align:left;margin:4px 0;padding:4px;font-size:12px}.week-grid{display:grid;grid-template-columns:64px repeat(7,minmax(100px,1fr));min-width:764px}.week-corner,.week-day-head,.time-label,.time-slot{border:1px solid var(--border);padding:6px}.time-slot{min-height:56px}.day-layout{display:grid;grid-template-columns:80px 1fr}.day-hour,.day-slot{min-height:60px;border-bottom:1px solid var(--border);padding:8px}.day-event{padding:8px;background:var(--surface-2)}.cal-form{display:grid;gap:14px}.cal-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cal-modal-head{display:flex;justify-content:space-between;align-items:center}.sync-status-card{font-size:13px;color:var(--muted);background:var(--surface-2);padding:12px}.duration-summary{color:var(--muted);font-size:13px}@media(max-width:800px){.calendar-shell{grid-template-columns:1fr}.cal-form-row{grid-template-columns:1fr}}</style></head><body><main class="calendar-shell"><aside class="cal-sidebar"><button class="cal-btn primary" id="create-event-btn">+ Create event</button><input class="cal-search" id="calendar-search" type="search" placeholder="Search events…" aria-label="Search events"><div class="sidebar-title">Mini calendar</div><div class="mini-month" id="mini-month"></div><div class="sidebar-title">Upcoming</div><div class="cal-list" id="upcoming-list"></div><div class="sidebar-title">Backup this calendar</div><button class="cal-btn" id="export-events-btn">Export JSON</button><label class="cal-btn">Import JSON<input type="file" id="import-events-input" accept="application/json" hidden></label><div class="sync-status-card" id="supabase-sync-status"><strong>Browser-local calendar</strong><br>Events stay in this browser unless you export them. Cloud sync is not configured.</div></aside><section class="cal-main"><div class="cal-toolbar"><div class="cal-toolbar-left"><button class="cal-icon-btn" id="prev-btn" aria-label="Previous period">←</button><button class="cal-btn" id="today-btn">Today</button><button class="cal-icon-btn" id="next-btn" aria-label="Next period">→</button><h1 class="cal-title" id="cal-title">Calendar</h1></div><div class="cal-toolbar-right" role="tablist" aria-label="Calendar views"><button class="cal-view-btn active" role="tab" aria-selected="true" tabindex="0" data-view="month">Month</button><button class="cal-view-btn" role="tab" aria-selected="false" tabindex="-1" data-view="week">Week</button><button class="cal-view-btn" role="tab" aria-selected="false" tabindex="-1" data-view="day">Day</button><button class="cal-view-btn" role="tab" aria-selected="false" tabindex="-1" data-view="agenda">Agenda</button></div></div><div class="calendar-stage" id="calendar-stage" role="tabpanel"></div></section></main><div class="cal-modal" id="event-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true"><div class="cal-modal-card"><div class="cal-modal-head"><h2 id="modal-title">Create event</h2><button class="cal-icon-btn" id="close-modal" aria-label="Close dialog">×</button></div><form class="cal-form" id="event-form"><input type="hidden" id="event-id"><label>Title<input id="event-title" required></label><div class="cal-form-row"><label>Date<input type="date" id="event-date" required></label><label>Calendar<select id="event-calendar"><option value="class">Class</option><option value="dissertation">Dissertation</option><option value="study">Study</option><option value="meeting">Meeting</option><option value="clinical">Clinical / Practicum</option><option value="wellness">Wellness</option><option value="personal">Personal</option><option value="other">Other</option></select></label></div><div class="cal-form-row"><label>Start time<input type="time" id="event-start" required></label><label>End time<input type="time" id="event-end" required></label></div><label>Duration<select id="event-duration"><option value="custom">Custom</option><option value="15">15 minutes</option><option value="30">30 minutes</option><option value="45">45 minutes</option><option value="60">1 hour</option><option value="90">1.5 hours</option><option value="120">2 hours</option><option value="180">3 hours</option><option value="240">4 hours</option></select></label><input id="event-duration-note" disabled value="Change start/end times anytime"><div class="duration-summary" id="event-duration-summary">Duration: —</div><div class="cal-form-row"><label>Repeat<select id="event-repeat"><option value="none">Does not repeat</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></label><label>Reminder<select id="event-reminder"><option value="none">No reminder (notifications not configured)</option><option value="10">Record 10 minutes</option><option value="30">Record 30 minutes</option><option value="60">Record 1 hour</option></select></label></div><label>Location<input id="event-location"></label><label>Notes<textarea id="event-notes"></textarea></label><div class="form-actions"><button type="button" class="cal-btn danger" id="delete-event-btn" style="display:none">Delete</button><div class="form-actions-right"><button type="button" class="cal-btn" id="cancel-event-btn">Cancel</button><button type="submit" class="cal-btn primary">Save</button></div></div></form></div></div><span id="calendar-today-label" hidden></span><script src="storage.js"></script><script src="app-shell.js"></script><script src="calendar.js"></script></body></html>
